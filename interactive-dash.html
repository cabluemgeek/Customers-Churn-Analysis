<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Churn Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6fb;
}

/* HEADER */

header{
    background:#1f4e79;
    color:white;
    padding:20px;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,.2);
}

header h1{
    margin-bottom:5px;
}

header p{
    opacity:.9;
}

/* BUTTONS */

.button-container{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;

    padding:20px;
}

.toggle-btn{

    padding:12px 22px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    background:#e0e0e0;

    font-size:15px;
    font-weight:bold;

    transition:.25s;
}

.toggle-btn:hover{
    background:#d2d2d2;
}

.toggle-btn.active{
    background:#1f77b4;
    color:white;
}

/* CARD */

.card{

    width:95%;
    max-width:1300px;

    margin:auto;

    background:white;

    border-radius:12px;

    box-shadow:0 4px 12px rgba(0,0,0,.15);

    padding:15px;

    margin-bottom:30px;

}

/* IFRAME */

iframe{

    width:100%;
    height:700px;

    border:none;

}

</style>

</head>

<body>

<header>

<h1>Customer Churn Prediction Dashboard</h1>

<p>XGBoost Model Results & Exploratory Data Analysis</p>

</header>



<div class="button-container">

<button class="toggle-btn active"
onclick="showGraph('Dashboard/confusion_matrix.html',this)">
Confusion Matrix
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/roc_curve.html',this)">
ROC Curve
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/feature_importance.html',this)">
Feature Importance
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/correlation_heatmap.html',this)">
Correlation Heatmap
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/age_distribution.html',this)">
Age Distribution
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/churn_distribution.html',this)">
Churn Distribution
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/balance_distribution.html',this)">
Balance Distribution
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/geography_distribution.html',this)">
Geography
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/gender_distribution.html',this)">
Gender
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard/credit_score_distribution.html',this)">
Credit Score
</button>

</div>



<div class="card">

<iframe
id="graphFrame"
src="confusion_matrix.html">
</iframe>

</div>



<script>

function showGraph(file,button){

    document.getElementById("graphFrame").src=file;

    let buttons=document.querySelectorAll(".toggle-btn");

    buttons.forEach(btn=>btn.classList.remove("active"));

    button.classList.add("active");

}

</script>

</body>
</html>
