<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Churn Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6fb;
}

/* ================= HEADER ================= */

header{
    background:#1f4e79;
    color:white;
    text-align:center;
    padding:25px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

header h1{
    margin-bottom:8px;
}

header p{
    opacity:0.9;
    font-size:17px;
}

/* ================= BUTTONS ================= */

.button-container{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;

    gap:12px;

    padding:25px;
}

.toggle-btn{

    padding:12px 22px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    background:#e5e5e5;

    font-size:15px;

    font-weight:bold;

    transition:.3s;
}

.toggle-btn:hover{

    background:#d4d4d4;

}

.toggle-btn.active{

    background:#1f77b4;

    color:white;

}

/* ================= CARD ================= */

.card{

    width:95%;

    max-width:1400px;

    margin:auto;

    background:white;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    padding:20px;

    margin-bottom:40px;

    /* fixes the "small chart stuck in the corner" issue:
       the card now grows to fill available width, and the
       iframe below fills 100% of the card's actual box  */
    display:flex;
    flex-direction:column;

}

#graphTitle{

    text-align:center;

    color:#1f4e79;

    margin-bottom:20px;

}

/* ================= IFRAME ================= */

.iframe-wrapper{
    /* keeps a consistent, generous viewing area on large screens instead
       of the iframe shrinking to whatever the chart's internal size is */
    position:relative;
    width:100%;
    height:75vh;
    min-height:500px;
    max-height:850px;
}

iframe{

    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    border:none;

    border-radius:8px;

    display:block;

}

/* on smaller screens, give the chart a bit more breathing room
   relative to the viewport so it doesn't feel cramped */
@media (max-width:768px){
    .iframe-wrapper{
        height:60vh;
        min-height:380px;
    }
}

</style>

</head>

<body>

<header>

<h1>Customer Churn Prediction Dashboard</h1>

<p>XGBoost Model Results &amp; Exploratory Data Analysis</p>

</header>

<!-- ================= BUTTONS ================= -->

<div class="button-container">

<button class="toggle-btn active"
onclick="showGraph('Dashboard_items/confusion_matrix.html',this)">
Confusion Matrix
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard_items/roc_curve.html',this)">
ROC Curve
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard_items/correlation_heatmap.html',this)">
Correlation Heatmap
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard_items/age_distribution.html',this)">
Age Distribution
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard_items/churn_by_category.html',this)">
Churn by Category
</button>

<button class="toggle-btn"
onclick="showGraph('Dashboard_items/churn_distribution.html',this)">
Churn Distribution
</button>

</div>

<!-- ================= GRAPH CARD ================= -->

<div class="card">

<h2 id="graphTitle">
Confusion Matrix
</h2>

<div class="iframe-wrapper">
<iframe

id="graphFrame"

src="Dashboard_items/confusion_matrix.html">

</iframe>
</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

function showGraph(file, button){

    // Change graph
    // "?v=" + Date.now() forces the browser to treat this as a brand-new
    // URL every click, so it can never serve a cached copy of a previous
    // chart instead of the one you just clicked
    document.getElementById("graphFrame").src = file + "?v=" + Date.now();

    // Change title

    document.getElementById("graphTitle").innerText = button.innerText;

    // Remove active button

    let buttons = document.querySelectorAll(".toggle-btn");

    buttons.forEach(btn => btn.classList.remove("active"));

    // Highlight clicked button

    button.classList.add("active");

}

</script>

</body>

</html>
